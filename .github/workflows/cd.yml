name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'

jobs:
  # ── Build & push toutes les images Docker ────────────────────────────────────
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: gateway
            context: ./backend/gateway
            image: ghcr.io/${{ github.repository_owner }}/toit-gateway
          - service: users-service
            context: ./backend/users-service
            image: ghcr.io/${{ github.repository_owner }}/toit-users-service
          - service: colocations-service
            context: ./backend/colocations-service
            image: ghcr.io/${{ github.repository_owner }}/toit-colocations-service
          - service: messages-service
            context: ./backend/messages-service
            image: ghcr.io/${{ github.repository_owner }}/toit-messages-service
          - service: frontend
            context: ./frontend/toit-a-toit-frontend
            image: ghcr.io/${{ github.repository_owner }}/toit-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Se connecter à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Se connecter à Docker Hub (éviter le rate-limit sur moby/buildkit)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Déploiement gateway sur Render ───────────────────────────────────────────
  deploy:
    name: Deploy gateway
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déclencher le déploiement Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Déploiement déclenché"

  # ── Vérification santé après déploiement (smoke test) ───────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Attendre le redémarrage Render
        run: sleep 30

      - name: Vérifier que le gateway répond
        run: |
          curl --fail \
            --retry 10 \
            --retry-delay 15 \
            --retry-connrefused \
            --max-time 60 \
            --connect-timeout 10 \
            "${{ secrets.RENDER_DEPLOY_URL }}/health" \
            -H "Accept: application/json"
          echo "Gateway opérationnel"

  # ── Résumé CD ────────────────────────────────────────────────────────────────
  cd-success:
    name: CD OK
    runs-on: ubuntu-latest
    needs: [smoke-test]

    steps:
      - name: Déploiement terminé
        run: echo "CD réussi — gateway déployé sur Render"