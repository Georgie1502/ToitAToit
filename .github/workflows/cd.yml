name: CD — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Build & push toutes les images Docker ────────────────────────────────────
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: gateway
            context: ./backend/gateway
            image: ghcr.io/${{ github.repository_owner }}/toit-gateway
          - service: users-service
            context: ./backend/users-service
            image: ghcr.io/${{ github.repository_owner }}/toit-users-service
          - service: colocations-service
            context: ./backend/colocations-service
            image: ghcr.io/${{ github.repository_owner }}/toit-colocations-service
          - service: messages-service
            context: ./backend/messages-service
            image: ghcr.io/${{ github.repository_owner }}/toit-messages-service
          - service: frontend
            context: ./frontend/toit-a-toit-frontend
            image: ghcr.io/${{ github.repository_owner }}/toit-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Se connecter à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Tag git de version ───────────────────────────────────────────────────────
  tag-release:
    name: Tag version
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Générer le tag de version
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Tag généré : ${VERSION}"

      - name: Créer le tag git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.tag.outputs.version }}
          git push origin ${{ steps.tag.outputs.version }}

  # ── Vérification santé après déploiement (smoke test) ───────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build-and-push
    if: vars.DEPLOY_URL != ''

    steps:
      - name: Vérifier que le gateway répond
        run: |
          echo "Attente du démarrage..."
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            "${{ vars.DEPLOY_URL }}/api/health" \
            -H "Accept: application/json"
          echo "✅ Gateway opérationnel"

  # ── Résumé CD ────────────────────────────────────────────────────────────────
  cd-success:
    name: CD OK
    runs-on: ubuntu-latest
    needs: [build-and-push, tag-release]
    steps:
      - name: Déploiement terminé
        run: echo "🚀 CD réussi — images publiées sur ghcr.io"
