name: Health Check — Supervision des services

on:
  schedule:
    # Toutes les heures
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Vérification de la disponibilité
    runs-on: ubuntu-latest

    steps:
      - name: Vérifier la gateway (endpoint agrégé)
        id: gateway
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.RENDER_DEPLOY_URL }}/api/health")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "response=$(cat /tmp/health_response.json)" >> $GITHUB_OUTPUT

      - name: Afficher le résultat
        run: |
          echo "Statut HTTP : ${{ steps.gateway.outputs.status }}"
          echo "Réponse : ${{ steps.gateway.outputs.response }}"

      - name: Ouvrir une issue si la gateway est dégradée
        if: steps.gateway.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            const response = `${{ steps.gateway.outputs.response }}`;
            const status = `${{ steps.gateway.outputs.status }}`;
            const now = new Date().toISOString();

            // Vérifier qu'aucune issue d'alerte n'est déjà ouverte
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'supervision,incident',
              state: 'open',
            });

            if (existingIssues.data.length > 0) {
              console.log('Une issue d\'incident est déjà ouverte — pas de doublon créé.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[INCIDENT] Service dégradé détecté — ${now}`,
              body: [
                '## Alerte supervision automatique',
                '',
                `**Détecté le :** ${now}`,
                `**Statut HTTP :** ${status}`,
                '',
                '**Réponse du endpoint /api/health :**',
                '```json',
                response,
                '```',
                '',
                '## Actions à mener',
                '- [ ] Identifier le ou les services en erreur',
                '- [ ] Consulter les logs Docker du service concerné',
                '- [ ] Appliquer un correctif et vérifier le retour à la normale',
                '- [ ] Fermer cette issue une fois la disponibilité rétablie',
              ].join('\n'),
              labels: ['supervision', 'incident'],
            });
