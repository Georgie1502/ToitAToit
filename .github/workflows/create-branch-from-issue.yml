name: Create Branch from Issue

on:
  issues:
    types: [opened]

jobs:
  create-branch:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract issue details
        id: issue
        run: |
          set -euo pipefail
          ISSUE_TITLE="${{ github.event.issue.title }}"

          echo "Titre de l'issue : $ISSUE_TITLE"

          # Extraire l'ID de l'issue depuis le titre (ex. TOIT-3002 depuis "TOIT-3002 Create Client Auto Docker Deploy")
          ISSUE_ID=$(echo "${ISSUE_TITLE}" | grep -oE '^[A-Z]+-[0-9]+' || true)

          if [ -z "$ISSUE_ID" ]; then
            echo "error=true" >> $GITHUB_OUTPUT
            echo "message=Le titre de l'issue doit commencer par un ID au format attendu (ex. TOIT-3002 ...)" >> $GITHUB_OUTPUT
            echo "::error::Titre d'issue invalide. Préfixe attendu comme TOIT-1234."
            exit 0
          fi

          BRANCH_NAME="feat/${ISSUE_ID}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "issue_id=${ISSUE_ID}" >> $GITHUB_OUTPUT
          echo "error=false" >> $GITHUB_OUTPUT
          echo "::notice::Branche proposée : ${BRANCH_NAME}"

      - name: Check branch existence
        id: branch
        if: steps.issue.outputs.error == 'false'
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ steps.issue.outputs.branch_name }}"

          if git ls-remote --heads origin "${BRANCH_NAME}" | grep -q "refs/heads/${BRANCH_NAME}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "message=La branche existe déjà : ${BRANCH_NAME}" >> $GITHUB_OUTPUT
            echo "::warning::La branche existe déjà sur origin : ${BRANCH_NAME}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::La branche n'existe pas sur origin : ${BRANCH_NAME}"
          fi

      - name: Create branch from default
        if: steps.issue.outputs.error == 'false' && steps.branch.outputs.exists == 'false'
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          echo "Branche par défaut utilisée : ${DEFAULT_BRANCH}"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"

          # Créer la nouvelle branche
          git checkout -b "${{ steps.issue.outputs.branch_name }}"
          git push origin "${{ steps.issue.outputs.branch_name }}"

      - name: Comment on issue - Success
        if: steps.issue.outputs.error == 'false' && steps.branch.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Branche créée : \`${{ steps.issue.outputs.branch_name }}\`\n\nTu peux maintenant commencer à travailler sur cette issue en utilisant la branche de fonctionnalité.`
            })

      - name: Comment on issue - Branch exists
        if: steps.issue.outputs.error == 'false' && steps.branch.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ La branche existe déjà : \`${{ steps.issue.outputs.branch_name }}\`\n\nMerci d'utiliser la branche existante pour cette issue.`
            })

      - name: Comment on issue - Error
        if: steps.issue.outputs.error == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Échec de création de la branche : ${{ steps.issue.outputs.message }}\n\nMerci de mettre à jour le titre de l'issue au format : \`TOIT-#### Description\``
            })

      - name: Write step summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Créer une branche à partir d'une issue"
            echo
            echo "- Issue: #${{ github.event.issue.number }}"
            echo "- Titre : ${{ github.event.issue.title }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.issue.outputs.error }}" = "true" ]; then
            {
              echo "- Statut : Échec"
              echo "- Raison : ${{ steps.issue.outputs.message }}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "- ID issue : ${{ steps.issue.outputs.issue_id }}"
            echo "- Branche : ${{ steps.issue.outputs.branch_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.branch.outputs.exists }}" = "true" ]; then
            echo "- Statut : La branche existe déjà" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Statut : Branche créée" >> "$GITHUB_STEP_SUMMARY"
          fi
