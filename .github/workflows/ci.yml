name: CI — Tests & Lint

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
      - 'test/**'
      - 'docs/**'
    paths-ignore:
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'

jobs:
  # ── validation titre PR (Conventional Commits) ───────────────────────────────
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            perf
            style
            build
            ci

  # ── build Docker (validation uniquement, sans push) ─────────────────────────
  build-docker:
    name: Build Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: gateway
            context: ./backend/gateway
          - service: users-service
            context: ./backend/users-service
          - service: colocations-service
            context: ./backend/colocations-service
          - service: messages-service
            context: ./backend/messages-service
          - service: frontend
            context: ./frontend/toit-a-toit-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          target: production
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── users-service ────────────────────────────────────────────────────────────
  test-users-service:
    name: Tests — users-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/users-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Audit des dépendances
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Lancer les tests avec coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-users-service
          path: backend/users-service/coverage

  # ── colocations-service ──────────────────────────────────────────────────────
  test-colocations-service:
    name: Tests — colocations-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/colocations-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Audit des dépendances
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Lancer les tests avec coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-colocations-service
          path: backend/colocations-service/coverage

  # ── messages-service ─────────────────────────────────────────────────────────
  test-messages-service:
    name: Tests — messages-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/messages-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Audit des dépendances
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Lancer les tests avec coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-messages-service
          path: backend/messages-service/coverage

  # ── gateway ──────────────────────────────────────────────────────────────────
  test-gateway:
    name: Tests — gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Audit des dépendances
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Lancer les tests avec coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-gateway
          path: backend/gateway/coverage

  # ── frontend ─────────────────────────────────────────────────────────────────
  test-frontend:
    name: Tests & Lint — frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/toit-a-toit-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Audit des dépendances
        run: npm audit --audit-level=critical

      - name: Lint
        run: npx eslint src --ext .js,.jsx --max-warnings 0

      - name: Lancer les tests avec coverage
        run: npm test -- --watchAll=false --coverage --passWithNoTests
        env:
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-frontend
          path: frontend/toit-a-toit-frontend/coverage

  # ── résumé CI ─────────────────────────────────────────────────────────────────
  ci-success:
    name: CI OK
    runs-on: ubuntu-latest
    needs:
      - build-docker
      - test-users-service
      - test-colocations-service
      - test-messages-service
      - test-gateway
      - test-frontend
    steps:
      - name: Tous les tests sont passés
        run: echo " CI réussie — tous les services sont verts"
